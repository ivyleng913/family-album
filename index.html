<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>父亲节快乐</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <section class="hero">
    <div class="hero-content">
      <p class="eyebrow">Happy Father's Day</p>
      <h1>爸爸，父亲节快乐</h1>
      <p class="hero-text">
        有些爱不常说出口，却一直都在。谢谢你陪我长大，也请让我慢慢陪你变老。
      </p>
    </div>
  </section>

  <section class="intro">
    <h2>我们的回忆</h2>
    <p>
      这些照片记录着我们一起走过的时间。每一个普通的瞬间，后来都变成了最珍贵的回忆。
    </p>
  </section>

  <section class="gallery" id="gallery"></section>

  <section class="letter">
    <h2>想对你说</h2>
    <p>
      爸爸，谢谢你一直以来的保护、支持和陪伴。
      你不一定总是把爱说出口，但我知道，你一直都在我身后。
    </p>
    <p class="sign">—— 爱你的孩子</p>
  </section>

  <footer>
    <p>Father's Day · With Love</p>
  </footer>

  <script src="photos.js"></script>
</body>
</html>
